services:
  postgres:
    image: postgres:16
    container_name: staking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: staking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - staking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d staking_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  airflow-init:
    image: apache/airflow:2.10.5-python3.12
    container_name: staking_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/staking_db
      AIRFLOW__WEBSERVER__SECRET_KEY: blockchain-staking-secret-key
      PYTHONPATH: /opt/airflow/project
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: staking_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes: &airflow-common-volumes
      - ../dags:/opt/airflow/dags
      - ..:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Babacar \
          --lastname Ba \
          --role Admin \
          --email admin@example.com

  airflow-webserver:
    image: apache/airflow:2.10.5-python3.12
    container_name: staking_airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.12
    container_name: staking_airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler

volumes:
  staking_postgres_data:
  airflow_logs:
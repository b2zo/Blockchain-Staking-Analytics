services:
  postgres:
    image: postgres:16
    container_name: staking_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: staking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      
      - "5433:5432"

    volumes:
      # Preserve PostgreSQL data between container restarts.
      - staking_postgres_data:/var/lib/postgresql/data

    healthcheck:
      # Confirm that PostgreSQL is accepting connections.
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d staking_db",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  etl:
    build:
      context: ..
      dockerfile: Dockerfile

    container_name: staking_etl

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: staking_db
      DB_USER: postgres
      DB_PASSWORD: postgres

volumes:
  staking_postgres_data: